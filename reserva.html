<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reserva.css">
    <title>Reserva-MagalhãesFitness</title>
</head>
<body>
    <div class="caixa-da-reserva">
        <form >
            <label for="name">Nome</label><br>
            <input type="name" name="name" id="nome" placeholder="Digite seu Nome" class="nome-telefone"><br>

            <label for="numero">Número de Telefone</label><br>
            <input type="number" name="numero" id="numero" placeholder="Número de Telefone" class="nome-telefone"><br>

            <label for="data">Marcar a data</label><br>
            <input type="date" name="data" id="data" class="data-horas"><br>

            <label for="horario">Horário</label><br>
            <input type="time" name="horario" id="horas" class="data-horas">
            <button type="submit" id="btn-agendar" class="agendarClass">Agendar</button>
        </form>

        <a href="index.html">Voltar</a>

    </div>



    <script src="scripts.js"></script>
</body>
</html>
